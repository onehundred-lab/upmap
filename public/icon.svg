<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="pin" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ccff00"/>
      <stop offset="100%" stop-color="#99cc00"/>
    </linearGradient>
  </defs>
  <!-- 배경 라운드 사각형 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- 지도 핀 -->
  <path d="M256 72c-72 0-130 58-130 130 0 97 130 238 130 238s130-141 130-238c0-72-58-130-130-130z" fill="url(#pin)"/>
  <!-- 눈 (형광 핀 안, 검정 원 위) -->
